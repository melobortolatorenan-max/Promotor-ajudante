<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotor Ajudante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #030712; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Sistema de Troca de Telas */
        .secao-principal { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .secao-principal.ativa { display: flex !important; }

        /* Estilização de Inputs e Botões */
        .input-custom { 
            width: 100%; background-color: #111827; border: 1px solid #1f2937; 
            padding: 1rem; border-radius: 1rem; color: white; margin-bottom: 0.8rem; outline: none; 
        }
        .btn-amarelo { 
            background-color: #f59e0b; color: #030712; font-weight: 900; 
            padding: 1rem; border-radius: 1rem; text-transform: uppercase; width: 100%; 
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .nav-aba.ativa { background-color: #f59e0b !important; color: #030712 !important; }

        /* Placeholder da Data */
        input[type="date"]::before { content: "selecionar data"; width: 100%; color: #6b7280; }
        input[type="date"]:focus::before, input[type="date"]:valid::before { display: none; }
    </style>
</head>
<body>

    <section id="tela-login" class="secao-principal ativa items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <div class="bg-gray-900 border border-gray-800 p-4 rounded-3xl w-fit mx-auto mb-4">
                <i data-lucide="user-square-2" class="w-12 h-12 text-amber-500"></i>
            </div>
            <h1 class="text-3xl font-black mb-10 uppercase italic tracking-tighter">
                Promotor <span class="text-amber-500">Ajudante</span>
            </h1>
            
            <input type="email" id="login-email" placeholder="E-mail" class="input-custom">
            <input type="password" id="login-senha" placeholder="Senha" class="input-custom">
            
            <button onclick="realizarLogin()" class="btn-amarelo">Entrar</button>
            <button onclick="navegarPara('tela-cadastro')" class="mt-6 text-amber-500 text-xs font-bold uppercase tracking-widest">Criar Nova Conta</button>
        </div>
    </section>

    <section id="tela-cadastro" class="secao-principal items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl w-fit mx-auto mb-4">
                <i data-lucide="user-plus" class="w-10 h-10 text-amber-500"></i>
            </div>
            <h2 class="text-2xl font-black mb-6 uppercase text-amber-500 italic">Cadastro</h2>
            <input type="text" id="cad-nome" placeholder="Nome Completo" class="input-custom">
            <input type="email" id="cad-email" placeholder="E-mail" class="input-custom">
            <input type="text" id="cad-empresa" placeholder="Empresa" class="input-custom">
            <input type="password" id="cad-senha" placeholder="Senha (6 dígitos)" maxlength="6" class="input-custom">
            
            <button onclick="salvarNovoUsuario()" class="btn-amarelo">Finalizar Cadastro</button>
            <button onclick="navegarPara('tela-login')" class="mt-4 text-gray-500 text-xs font-bold uppercase">Voltar ao Login</button>
        </div>
    </section>

    <section id="tela-app" class="secao-principal">
        <header class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-950 sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-gray-900 p-1.5 rounded-md border border-gray-800">
                    <i data-lucide="user-square-2" class="w-4 h-4 text-amber-500"></i>
                </div>
                <div class="flex flex-col leading-none text-left">
                    <span class="text-[8px] font-bold text-gray-500 uppercase">Promotor</span>
                    <span class="text-sm font-black text-amber-500 uppercase italic">Ajudante</span>
                </div>
            </div>
            <nav class="flex gap-1 bg-gray-900 p-1 rounded-xl">
                <button onclick="mudarAba('home')" id="nav-home" class="nav-aba px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Início</button>
                <button onclick="mudarAba('lojas')" id="nav-lojas" class="nav-aba px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Lojas</button>
                <button onclick="mudarAba('produtos')" id="nav-produtos" class="nav-aba px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Produtos</button>
            </nav>
        </header>

        <main id="conteudo-dinamico" class="p-5 flex-1 overflow-y-auto pb-24"></main>
    </section>

    <script>
        // Banco de Dados Local
        let bancoLojas = JSON.parse(localStorage.getItem('promotor_lojas')) || [];

        // Inicialização de Ícones
        lucide.createIcons();

        // Navegação entre Login/Cadastro/App
        function navegarPara(id) {
            document.querySelectorAll('.secao-principal').forEach(s => s.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            lucide.createIcons();
        }

        // Cadastro de Usuário
        function salvarNovoUsuario() {
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            if(!email || !senha) return alert("Por favor, preencha os dados.");
            
            localStorage.setItem('usuario_cadastrado', JSON.stringify({ email, senha }));
            alert("Conta criada! Faça seu login.");
            navegarPara('tela-login');
        }

        // Login
        function realizarLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            const salvo = JSON.parse(localStorage.getItem('usuario_cadastrado'));

            if(salvo && salvo.email === email && salvo.senha === senha) {
                navegarPara('tela-app');
                mudarAba('home');
            } else {
                alert("Usuário ou senha incorretos.");
            }
        }

        // Navegação das Abas do App
        function mudarAba(aba) {
            document.querySelectorAll('.nav-aba').forEach(b => b.classList.remove('ativa'));
            document.getElementById('nav-' + aba).classList.add('ativa');
            const main = document.getElementById('conteudo-dinamico');
            main.innerHTML = "";

            if(aba === 'home') {
                let totalVencendo = 0;
                bancoLojas.forEach(l => l.produtos.forEach(p => {
                    const dias = Math.ceil((new Date(p.data) - new Date()) / 86400000);
                    if(dias <= 3) totalVencendo++;
                }));

                main.innerHTML = `
                    <div class="flex gap-4 mb-8">
                        <div class="bg-gray-900 flex-1 p-6 rounded-3xl border border-gray-800 text-center">
                            <div class="text-amber-500 text-3xl font-black">${bancoLojas.length}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase italic">Lojas</div>
                        </div>
                        <div class="bg-gray-900 flex-1 p-6 rounded-3xl border border-gray-800 text-center">
                            <div class="text-red-500 text-3xl font-black">${totalVencendo}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase italic">Vencendo</div>
                        </div>
                    </div>
                    <h2 class="text-xs font-black text-red-500 uppercase mb-4 italic tracking-widest">Alertas Críticos</h2>
                `;
            }

            if(aba === 'lojas') {
                main.innerHTML = `<button onclick="criarLoja()" class="btn-amarelo mb-6">Nova Loja</button>`;
                bancoLojas.forEach(l => {
                    main.innerHTML += `
                        <div class="bg-gray-900 p-4 rounded-2xl mb-2 flex justify-between items-center border border-gray-800">
                            <span onclick="abrirLoja('${l.nome}')" class="font-bold uppercase cursor-pointer">${l.nome}</span>
                            <i onclick="removerLoja('${l.nome}')" data-lucide="trash-2" class="w-5 h-5 text-red-500 cursor-pointer"></i>
                        </div>`;
                });
            }

            if(aba === 'produtos') {
                main.innerHTML = `
                    <h2 class="text-xl font-black uppercase mb-6 italic text-amber-500">Cadastrar Produto</h2>
                    <input id="prod-nome" placeholder="Produto" class="input-custom">
                    <input id="prod-qtd" placeholder="Qtd" type="number" class="input-custom">
                    <input id="prod-data" type="date" class="input-custom" required>
                    <select id="prod-loja" class="input-custom">
                        ${bancoLojas.map(l => `<option value="${l.nome}">${l.nome}</option>`).join('')}
                    </select>
                    <button onclick="salvarProduto()" class="btn-amarelo mt-4">Salvar Produto</button>
                `;
            }
            lucide.createIcons();
        }

        // Funções de Gerenciamento
        function criarLoja() {
            const n = prompt("Nome da unidade:");
            if(n) { bancoLojas.push({nome: n, produtos: []}); salvarDB(); mudarAba('lojas'); }
        }

        function abrirLoja(nome) {
            const main = document.getElementById('conteudo-dinamico');
            const loja = bancoLojas.find(l => l.nome === nome);
            main.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <i onclick="mudarAba('lojas')" data-lucide="arrow-left" class="text-amber-500 w-6 h-6 cursor-pointer"></i>
                    <h2 class="text-2xl font-black uppercase italic">${nome}</h2>
                </div>`;
            loja.produtos.forEach((p, i) => {
                main.innerHTML += `
                    <div class="bg-gray-900 p-4 rounded-2xl mb-2 flex justify-between items-center border border-gray-800">
                        <div>
                            <div class="text-amber-500 font-bold text-xs uppercase">${p.nome}</div>
                            <div class="text-xs text-gray-400 font-bold">${p.data.split('-').reverse().join('/')} — ${p.qtd} un</div>
                        </div>
                        <i onclick="removerProduto('${nome}', ${i})" data-lucide="trash-2" class="w-4 h-4 text-red-500 cursor-pointer"></i>
                    </div>`;
            });
            lucide.createIcons();
        }

        function salvarProduto() {
            const n = document.getElementById('prod-nome').value;
            const q = document.getElementById('prod-qtd').value;
            const d = document.getElementById('prod-data').value;
            const l = document.getElementById('prod-loja').value;
            if(!n || !d || !l) return alert("Preencha tudo!");
            bancoLojas.find(x => x.nome === l).produtos.push({nome: n, qtd: q, data: d});
            salvarDB(); alert("Salvo!"); mudarAba('home');
        }

        function removerLoja(nome) { if(confirm("Excluir loja?")) { bancoLojas = bancoLojas.filter(x => x.nome !== nome); salvarDB(); mudarAba('lojas'); } }
        function removerProduto(loja, idx) { bancoLojas.find(l => l.nome === loja).produtos.splice(idx, 1); salvarDB(); abrirLoja(loja); }
        function salvarDB() { localStorage.setItem('promotor_lojas', JSON.stringify(bancoLojas)); }
    </script>
</body>
</html>
