<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotor Ajudante - Validades</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .tela { display: none; }
        .tela.active { display: block; }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-full bg-gray-950 text-white selection:bg-amber-500/30">

    <div id="app-wrapper" class="w-full h-full flex flex-col min-h-screen">
        
        <nav class="w-full bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
            <div class="max-w-xl mx-auto px-4 py-2.5 flex justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="mostrarTela('home')">
                    <div class="bg-amber-500 p-1.5 rounded-lg">
                        <i data-lucide="layout-dashboard" class="w-5 h-5 text-gray-950"></i>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-[10px] font-bold text-amber-500 uppercase tracking-wider">App</span>
                        <span class="text-sm font-extrabold text-white">PROMOTOR AJUDANTE</span>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="mostrarTela('lojas')" class="p-2 hover:bg-gray-800 rounded-full transition-colors">
                        <i data-lucide="store" class="w-5 h-5 text-gray-400"></i>
                    </button>
                    <button onclick="mostrarTela('listaGeral')" class="p-2 hover:bg-gray-800 rounded-full transition-colors">
                        <i data-lucide="clipboard-list" class="w-5 h-5 text-gray-400"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="flex-1 w-full max-w-xl mx-auto p-4 pb-24">
            
            <div id="home" class="tela active fade-in">
                <div class="mb-10 text-center">
                    <div class="bg-amber-500/10 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                        <i data-lucide="shield-check" class="w-10 h-10 text-amber-500"></i>
                    </div>
                    <h2 class="text-3xl font-extrabold mb-1">Olá, Promotor!</h2>
                    <p class="text-gray-400 text-sm">Controle de validades no Promotor Ajudante.</p>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                        <span class="text-gray-500 text-xs font-bold uppercase tracking-widest">Lojas</span>
                        <div id="stat-lojas" class="text-3xl font-black mt-1">0</div>
                    </div>
                    <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                        <span class="text-gray-500 text-xs font-bold uppercase tracking-widest">Vencendo</span>
                        <div id="stat-vencidos" class="text-3xl font-black mt-1 text-red-500">0</div>
                    </div>
                </div>

                <button onclick="mostrarTela('lojas')" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-950 font-extrabold py-4 rounded-2xl transition-all shadow-lg shadow-amber-500/20 flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    COMEÇAR VERIFICAÇÃO
                </button>
            </div>

            <div id="lojas" class="tela fade-in">
                <h3 class="text-xl font-bold mb-4">Minhas Lojas</h3>
                <div id="lista-lojas" class="space-y-3">
                    </div>
            </div>

            <div id="listaGeral" class="tela fade-in">
                <h3 class="text-xl font-bold mb-4">Relatório Geral</h3>
                <div id="relatorio-itens" class="space-y-3">
                    </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();

        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Promotor Ajudante: SW ativo!'))
                    .catch(err => console.error('Erro no registro do SW', err));
            });
        }
    </script>
</body>
</html>
