<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotor Ajudante Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .secao { display: none; height: 100vh; flex-direction: column; }
        .secao.ativa { display: flex !important; }
        .card-app { background-color: #111827; border: 1px solid #1f2937; border-radius: 0.8rem; }
        .nav-aba.ativa { background-color: #f59e0b !important; color: #030712 !important; }
        .input-custom { width: 100%; background-color: #0f172a; border: 1px solid #1e293b; padding: 0.8rem; border-radius: 0.8rem; color: white; outline: none; }
        .btn-amarelo { background-color: #f59e0b; color: #030712; font-weight: 900; padding: 1rem; border-radius: 0.8rem; text-transform: uppercase; width: 100%; font-size: 0.75rem; border: none; cursor: pointer; }
        #modal-container { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; padding: 1.5rem; backdrop-filter: blur(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="modal-container">
        <div class="bg-[#111827] border border-gray-800 rounded-[2rem] w-full max-w-xs p-8 shadow-2xl text-center">
            <h2 id="modal-titulo" class="text-amber-500 font-black text-[12px] uppercase italic tracking-widest mb-4">SISTEMA</h2>
            <p id="modal-subtext" class="text-white text-sm mb-8 font-bold leading-tight uppercase"></p>
            <div class="flex gap-4">
                <button id="btn-cancelar" onclick="fecharModal()" class="flex-1 py-3 text-[10px] font-black uppercase text-gray-500">CANCELAR</button>
                <button id="modal-confirm" class="flex-1 bg-amber-500 text-gray-950 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-amber-500/20">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <section id="tela-app" class="secao ativa">
        <header class="p-4 border-b border-gray-800 bg-gray-950/80 sticky top-0 z-50">
            <div class="flex items-center gap-3 mb-4">
                <img src="https://raw.githubusercontent.com/melobortolatorenan-max/Promotor-ajudante/main/logo.png" class="w-10 h-10 rounded-xl">
                <div>
                    <h1 class="text-[9px] font-bold text-gray-500 uppercase tracking-widest leading-none">Promotor</h1>
                    <span class="text-xl font-black text-amber-500 uppercase italic leading-none">Ajudante</span>
                </div>
            </div>
            <nav class="flex gap-1 bg-gray-900 p-1 rounded-2xl border border-gray-800">
                <button onclick="aba('h')" id="n-h" class="nav-aba flex-1 py-2 rounded-xl text-[9px] font-black uppercase">Início</button>
                <button onclick="aba('l')" id="n-l" class="nav-aba flex-1 py-2 rounded-xl text-[9px] font-black uppercase">Lojas</button>
                <button onclick="aba('p')" id="n-p" class="nav-aba flex-1 py-2 rounded-xl text-[9px] font-black uppercase">Produtos</button>
                <button onclick="aba('r')" id="n-r" class="nav-aba flex-1 py-2 rounded-xl text-[9px] font-black uppercase">Relat.</button>
            </nav>
        </header>
        <main id="corpo" class="p-4 flex-1 overflow-y-auto no-scrollbar pb-24"></main>
    </section>

    <script>
        let lojas = JSON.parse(localStorage.getItem('db_promotor_v3')) || [];

        function salvar() { localStorage.setItem('db_promotor_v3', JSON.stringify(lojas)); }
        function fecharModal() { document.getElementById('modal-container').style.display = 'none'; }

        function aviso(msg, callback, titulo = "SISTEMA") {
            const container = document.getElementById('modal-container');
            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-subtext').innerHTML = msg;
            container.style.display = 'flex';
            document.getElementById('modal-confirm').onclick = () => { fecharModal(); if(callback) callback(true); };
        }

        function ajustarQtd(lIdx, pIdx, operacao) {
            let qtd = parseInt(lojas[lIdx].produtos[pIdx].qtd) || 0;
            if (operacao === 'sobe') lojas[lIdx].produtos[pIdx].qtd = qtd + 1;
            if (operacao === 'desce' && qtd > 0) lojas[lIdx].produtos[pIdx].qtd = qtd - 1;
            salvar();
            verLoja(lIdx);
        }

        function aba(id) {
            document.querySelectorAll('.nav-aba').forEach(b => b.classList.remove('ativa'));
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('ativa');
            const m = document.getElementById('corpo'); m.innerHTML = "";

            if(id === 'h') {
                // TELA DE INÍCIO COM ALERTAS POR DATA
                let todosProdutos = [];
                lojas.forEach((l, lIdx) => {
                    l.produtos.forEach((p, pIdx) => {
                        todosProdutos.push({...p, lojaNome: l.nome, lIdx, pIdx});
                    });
                });

                // Agrupar por data
                const grupos = todosProdutos.reduce((acc, curr) => {
                    if (!acc[curr.data]) acc[curr.data] = [];
                    acc[curr.data].push(curr);
                    return acc;
                }, {});

                // Ordenar datas
                const datasOrdenadas = Object.keys(grupos).sort();

                m.innerHTML = `
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="card-app p-4 text-center">
                            <div class="text-amber-500 font-black text-xl leading-none">${lojas.length}</div>
                            <div class="text-[8px] font-bold text-gray-500 uppercase mt-1">Lojas</div>
                        </div>
                        <div class="card-app p-4 text-center">
                            <div class="text-red-500 font-black text-xl leading-none">${todosProdutos.length}</div>
                            <div class="text-[8px] font-bold text-gray-500 uppercase mt-1">Alertas</div>
                        </div>
                    </div>
                `;

                datasOrdenadas.forEach(data => {
                    const dataFormatada = data.split('-').reverse().join('/');
                    let htmlData = `<div class="mb-4">
                        <div class="flex items-center gap-2 mb-3 text-red-500 font-black italic text-[10px] uppercase">
                            <i data-lucide="calendar" class="w-3 h-3"></i> Vence em: ${dataFormatada}
                        </div>`;
                    
                    grupos[data].forEach(prod => {
                        htmlData += `
                        <div class="card-app p-4 mb-2 border-l-4 border-red-500 flex justify-between items-center">
                            <div>
                                <div class="text-[8px] text-gray-500 font-black uppercase mb-1">${prod.lojaNome}</div>
                                <div class="text-amber-500 font-black italic uppercase text-[11px]">${prod.nome}</div>
                                <div class="text-red-500 font-bold text-[9px] mt-1">${prod.qtd} UNIDADES</div>
                            </div>
                            <button onclick="removerProdHome(${prod.lIdx}, ${prod.pIdx})" class="bg-red-500/10 p-2 rounded-lg">
                                <i data-lucide="trash-2" class="w-4 h-4 text-red-500"></i>
                            </button>
                        </div>`;
                    });
                    m.innerHTML += htmlData + `</div>`;
                });
            }

            if(id === 'l') {
                m.innerHTML = `<button onclick="addLoja()" class="btn-amarelo mb-4">+ NOVA LOJA</button>`;
                lojas.forEach((l, idx) => {
                    m.innerHTML += `<div class="card-app p-4 mb-2 flex justify-between items-center" onclick="verLoja(${idx})"><div class="font-black uppercase italic">${l.nome}</div><i onclick="event.stopPropagation(); delLoja(${idx})" data-lucide="trash-2" class="w-5 h-5 text-red-500"></i></div>`;
                });
            }

            if(id === 'p') {
                m.innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <h2 class="font-black uppercase text-amber-500 italic text-lg mb-6">Cadastro de Itens</h2>
                    <div class="space-y-4">
                        <input id="pn" placeholder="Nome do Produto" class="input-custom">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="pq" placeholder="Qtd" type="number" class="input-custom">
                            <input id="pd" type="date" class="input-custom">
                        </div>
                        <select id="pl" class="input-custom">
                            <option value="">Selecione a Loja...</option>
                            ${lojas.map(l => `<option value="${l.nome}">${l.nome}</option>`).join('')}
                        </select>
                        <button onclick="salvarP()" class="btn-amarelo mt-4">SALVAR NO ESTOQUE</button>
                    </div>
                </div>`;
            }

            if(id === 'r') {
                m.innerHTML = `<h2 class="text-center font-black uppercase text-amber-500 italic mb-6">Relatório Geral</h2>`;
                lojas.forEach(l => {
                    if(l.produtos.length > 0) {
                        let h = `<div class="mb-6 bg-gray-900/50 p-4 rounded-2xl border border-gray-800"><h3 class="text-amber-500 font-black text-[12px] mb-4 uppercase italic border-b border-gray-800 pb-2"><span>${l.nome}</span></h3>`;
                        l.produtos.forEach(p => {
                            h += `<div class="flex justify-between items-center border-b border-white/5 py-2"><div><div class="text-white font-bold text-[11px] uppercase italic">${p.nome}</div><div class="text-gray-500 text-[9px]">Venc: ${p.data.split('-').reverse().join('/')}</div></div><div class="text-amber-500 font-black text-[10px]">${p.qtd} UN</div></div>`;
                        });
                        m.innerHTML += h + `</div>`;
                    }
                });
            }
            lucide.createIcons();
        }

        function removerProdHome(lIdx, pIdx) {
            if(confirm("Deseja remover este item?")) {
                lojas[lIdx].produtos.splice(pIdx, 1);
                salvar();
                aba('h');
            }
        }

        function verLoja(idx) {
            const l = lojas[idx];
            const m = document.getElementById('corpo');
            m.innerHTML = `<div class="flex items-center gap-2 mb-6" onclick="aba('l')"><i data-lucide="chevron-left" class="text-amber-500"></i><h2 class="font-black uppercase text-amber-500 italic text-lg">${l.nome}</h2></div>`;
            l.produtos.forEach((p, pi) => {
                m.innerHTML += `
                <div class="card-app p-4 mb-3 flex justify-between items-center">
                    <div class="flex flex-col gap-1 items-center mr-4">
                        <i onclick="ajustarQtd(${idx}, ${pi}, 'sobe')" data-lucide="chevron-up" class="w-5 h-5 text-gray-500"></i>
                        <i onclick="ajustarQtd(${idx}, ${pi}, 'desce')" data-lucide="chevron-down" class="w-5 h-5 text-gray-500"></i>
                    </div>
                    <div class="flex-1">
                        <div class="text-white font-black italic uppercase text-xs">${p.nome}</div>
                        <div class="text-[9px] text-gray-500">${p.data.split('-').reverse().join('/')} | Qtd: ${p.qtd} un</div>
                    </div>
                    <i onclick="delProd(${idx}, ${pi})" data-lucide="x-circle" class="w-5 h-5 text-red-500 ml-2"></i>
                </div>`;
            });
            lucide.createIcons();
        }

        function salvarP() {
            const n = document.getElementById('pn').value, q = document.getElementById('pq').value, d = document.getElementById('pd').value, lNome = document.getElementById('pl').value;
            if(!n || !d || !lNome) return aviso("Preencha todos os campos!");
            let lIdx = lojas.findIndex(x => x.nome === lNome);
            if(lIdx > -1) { lojas[lIdx].produtos.push({nome: n, qtd: q || 0, data: d}); salvar(); aba('r'); }
        }

        function addLoja() { const n = prompt("Nome da loja:"); if(n) { lojas.push({nome: n, produtos: []}); salvar(); aba('l'); } }
        function delLoja(idx) { if(confirm("Excluir loja?")) { lojas.splice(idx, 1); salvar(); aba('l'); } }
        function delProd(li, pi) { lojas[li].produtos.splice(pi, 1); salvar(); verLoja(li); }

        document.addEventListener('DOMContentLoaded', () => aba('h'));
    </script>
</body>
</html>
