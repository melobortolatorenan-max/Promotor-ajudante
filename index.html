<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotor Ajudante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; margin: 0; overflow: hidden; }
        .secao { display: none; height: 100vh; flex-direction: column; }
        .secao.ativa { display: flex !important; }
        .card-dark { background-color: #111827; border: 1px solid #1f2937; border-radius: 1.2rem; }
        .nav-aba.ativa { background-color: #f59e0b !important; color: #030712 !important; }
        .input-custom { width: 100%; background-color: #0f172a; border: 1px solid #1e293b; padding: 0.8rem; border-radius: 0.8rem; color: white; margin-bottom: 0.6rem; outline: none; }
        .btn-amarelo { background-color: #f59e0b; color: #030712; font-weight: 900; padding: 1rem; border-radius: 1rem; text-transform: uppercase; width: 100%; border: none; }
    </style>
</head>
<body>

    <section id="tela-app" class="secao ativa">
        <header class="p-4 border-b border-gray-800 bg-gray-950">
            <div class="flex items-center gap-3 mb-4">
                <img src="https://raw.githubusercontent.com/melobortolatorenan-max/Promotor-ajudante/main/logo.png" class="w-10 h-10 rounded-lg">
                <div>
                    <h1 class="text-xs font-bold text-gray-500 uppercase tracking-widest leading-none">Promotor</h1>
                    <span class="text-lg font-black text-amber-500 uppercase italic leading-none">Ajudante</span>
                </div>
            </div>
            <nav class="flex gap-1 bg-gray-900 p-1 rounded-xl">
                <button onclick="aba('h')" id="n-h" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Início</button>
                <button onclick="aba('l')" id="n-l" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Lojas</button>
                <button onclick="aba('p')" id="n-p" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Produtos</button>
                <button onclick="aba('r')" id="n-r" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Relat.</button>
            </nav>
        </header>
        <main id="corpo" class="p-4 flex-1 overflow-y-auto pb-24"></main>
    </section>

    <script>
        let lojas = JSON.parse(localStorage.getItem('db_promotor_v3')) || [];
        let editando = { lojaIdx: -1, prodIdx: -1 };

        function salvar() { localStorage.setItem('db_promotor_v3', JSON.stringify(lojas)); }

        function aba(id, params = {}) {
            document.querySelectorAll('.nav-aba').forEach(b => b.classList.remove('ativa'));
            if(document.getElementById('n-' + id)) document.getElementById('n-' + id).classList.add('ativa');
            const m = document.getElementById('corpo'); m.innerHTML = "";

            if(id === 'h') {
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const limite = new Date(hoje); limite.setDate(hoje.getDate() + 3);
                let agrupados = {}; 
                let totalAlertas = 0;

                lojas.forEach(loja => {
                    loja.produtos.forEach(p => {
                        const dataP = new Date(p.data + "T12:00:00");
                        if(dataP <= limite) {
                            totalAlertas++;
                            // Agrupamento Foto 2: Mesmo nome e mesma loja
                            const chave = `${loja.nome.toUpperCase()}|${p.nome.toUpperCase()}`;
                            if(!agrupados[chave]) agrupados[chave] = { loja: loja.nome, produto: p.nome, validades: [] };
                            agrupados[chave].validades.push({ data: p.data, qtd: p.qtd });
                        }
                    });
                });

                m.innerHTML = `
                    <div class="grid grid-cols-2 gap-3 mb-6 text-center">
                        <div class="card-dark p-5 border-b-4 border-amber-500">
                            <div class="text-3xl font-black text-amber-500 italic">${lojas.length}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-tight">Lojas</div>
                        </div>
                        <div class="card-dark p-5 border-b-4 border-red-500">
                            <div class="text-3xl font-black text-red-500 italic">${totalAlertas}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-tight">Alertas</div>
                        </div>
                    </div>
                    <h3 class="text-[11px] font-black uppercase text-red-500 mb-4 italic flex items-center gap-2 px-1"><i data-lucide="alert-triangle" class="w-4 h-4"></i> Vencimentos Próximos</h3>
                `;

                Object.values(agrupados).forEach(g => {
                    m.innerHTML += `
                        <div class="card-dark p-4 mb-3 border-l-4 border-red-500">
                            <span class="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">${g.loja}</span>
                            <div class="text-amber-500 font-black text-sm uppercase italic mb-2 border-b border-white/5 pb-1">${g.produto}</div>
                            ${g.validades.map(v => `
                                <div class="flex justify-between items-center mt-1">
                                    <span class="text-white text-xs font-bold">${v.data.split('-').reverse().join('/')}</span>
                                    <span class="text-red-500 font-black text-xs">${v.qtd} un</span>
                                </div>
                            `).join('')}
                        </div>`;
                });
            }

            if(id === 'l') {
                m.innerHTML = `<button onclick="addLoja()" class="btn-amarelo mb-6 w-full text-xs">+ ADICIONAR LOJA</button>`;
                lojas.forEach((l, idx) => {
                    m.innerHTML += `
                        <div class="card-dark p-4 mb-2 flex justify-between items-center shadow-lg">
                            <div class="flex-1 truncate" onclick="verLoja(${idx})">
                                <span class="font-black uppercase italic text-sm truncate block">${l.nome}</span>
                                <span class="text-[10px] text-amber-500 font-black uppercase">${l.produtos.length} Produtos</span>
                            </div>
                            <div class="flex gap-4 ml-2">
                                <i onclick="aba('p',{loja:'${l.nome}'})" data-lucide="plus-circle" class="w-5 h-5 text-green-500 cursor-pointer"></i>
                                <i onclick="delLoja(${idx})" data-lucide="trash-2" class="w-5 h-5 text-red-600 cursor-pointer"></i>
                            </div>
                        </div>`;
                });
            }

            if(id === 'p') {
                const p = params.prod || { nome: '', qtd: '', data: '' };
                m.innerHTML = `
                <h2 class="text-center font-black uppercase text-amber-500 italic mb-6 leading-none">${params.prod ? 'EDITAR ITEM' : 'CADASTRAR PRODUTO'}</h2>
                <input id="pn" placeholder="Nome do Produto" class="input-custom" value="${p.nome}">
                <input id="pq" placeholder="Quantidade" type="number" class="input-custom" value="${p.qtd}">
                <input id="pd" type="date" class="input-custom" value="${p.data}">
                <select id="pl" class="input-custom">
                    <option value="">Selecione a Loja</option>
                    ${lojas.map(l => `<option value="${l.nome}" ${l.nome===(params.loja||'')?'selected':''}>${l.nome}</option>`).join('')}
                </select>
                <button onclick="salvarP()" class="btn-amarelo mt-4 w-full">SALVAR</button>`;
                editando = params.ref || { lojaIdx: -1, prodIdx: -1 };
            }

            if(id === 'r') {
                m.innerHTML = `<h2 class="text-center font-black uppercase text-amber-500 italic mb-6">RELATÓRIO GERAL</h2>`;
                lojas.forEach(loja => {
                    if(loja.produtos.length > 0) {
                        m.innerHTML += `<div class="mb-4 card-dark p-4">
                            <h3 class="text-amber-500 font-black text-[10px] mb-2 border-b border-gray-800 pb-1 uppercase italic">${loja.nome}</h3>
                            ${loja.produtos.map(p => `<div class="flex justify-between text-[11px] mb-1 font-bold"><span>${p.nome}</span><span>${p.data.split('-').reverse().join('/')} (${p.qtd}un)</span></div>`).join('')}
                        </div>`;
                    }
                });
            }
            lucide.createIcons();
        }

        function verLoja(idx) {
            const loja = lojas[idx];
            const m = document.getElementById('corpo');
            // Edição Foto 3: Ícone de voltar (seta)
            m.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <i onclick="aba('l')" data-lucide="chevron-left" class="w-6 h-6 text-amber-500 cursor-pointer"></i>
                    <h2 class="font-black uppercase text-amber-500 italic text-lg leading-none">${loja.nome}</h2>
                </div>
                <button onclick="aba('p',{loja:'${loja.nome}'})" class="btn-amarelo mb-6 w-full text-[10px] tracking-tight">+ NOVO PRODUTO NESTA LOJA</button>
            `;
            
            // Agrupamento de itens na visualização da loja
            let grupos = {};
            loja.produtos.forEach((p, pIdx) => {
                if(!grupos[p.nome.toUpperCase()]) grupos[p.nome.toUpperCase()] = { nome: p.nome, itens: [] };
                grupos[p.nome.toUpperCase()].itens.push({...p, idx: pIdx});
            });

            Object.values(grupos).forEach(g => {
                m.innerHTML += `
                    <div class="card-dark p-3 mb-2">
                        <div class="text-amber-500 font-black uppercase italic text-xs mb-2 border-b border-white/5 pb-1">${g.nome}</div>
                        ${g.itens.map(it => `
                            <div class="flex justify-between items-center py-1">
                                <div class="text-white font-bold text-[10px]">${it.data.split('-').reverse().join('/')} | ${it.qtd} un</div>
                                <div class="flex gap-4">
                                    <i onclick="aba('p',{loja:'${loja.nome}', prod: ${JSON.stringify(it).replace(/"/g, '&quot;')}, ref: {lojaIdx: ${idx}, prodIdx: ${it.idx}}})" data-lucide="edit-3" class="w-4 h-4 text-blue-400 cursor-pointer"></i>
                                    <i onclick="delProd(${idx}, ${it.idx})" data-lucide="x-circle" class="w-4 h-4 text-red-500 cursor-pointer"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            });
            lucide.createIcons();
        }

        function salvarP() {
            const n = document.getElementById('pn').value, q = document.getElementById('pq').value, d = document.getElementById('pd').value, l = document.getElementById('pl').value;
            if(!n || !d || !l) return alert("Preencha todos os campos!");
            if(editando.prodIdx > -1) {
                lojas[editando.lojaIdx].produtos[editando.prodIdx] = { nome: n, qtd: q, data: d };
            } else {
                const loja = lojas.find(x => x.nome === l);
                if(loja) loja.produtos.push({ nome: n, qtd: q, data: d });
            }
            salvar(); editando = { lojaIdx: -1, prodIdx: -1 }; aba('h');
        }

        function addLoja() { const n = prompt("Nome da Loja:"); if(n) { lojas.push({nome: n, produtos: []}); salvar(); aba('l'); } }
        function delLoja(idx) { if(confirm("Excluir loja?")) { lojas.splice(idx, 1); salvar(); aba('l'); } }
        function delProd(li, pi) { if(confirm("Remover produto?")) { lojas[li].produtos.splice(pi, 1); salvar(); verLoja(li); } }

        aba('h');
    </script>
</body>
</html>
