/script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; margin: 0; }
        
        /* Sistema de Telas: Garante que só uma apareça por vez */
        .tela-sistema { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .tela-sistema.ativa { display: flex !important; }
        
        .input-geral { width: 100%; background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; color: white; margin-bottom: 12px; outline: none; }
        .btn-amarelo { background-color: #f59e0b; color: #030712; font-weight: 900; padding: 16px; border-radius: 12px; text-transform: uppercase; width: 100%; border: none; cursor: pointer; }
        .aba-btn.selecionada { background-color: #f59e0b !important; color: #030712 !important; }
        
        /* Placeholder da data conforme solicitado */
        input[type="date"]::before { content: "selecionar data"; width: 100%; color: #6b7280; }
        input[type="date"]:focus::before, input[type="date"]:valid::before { display: none; }
    </style>
</head>
<body>

    <section id="view-login" class="tela-sistema ativa items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <div class="bg-gray-900 border border-gray-800 p-4 rounded-3xl w-fit mx-auto mb-4">
                <i data-lucide="user-square-2" class="w-12 h-12 text-amber-500"></i>
            </div>
            <h1 class="text-3xl font-black mb-10 uppercase italic">Promotor <span class="text-amber-500">Ajudante</span></h1>
            
            <input type="email" id="log-email" placeholder="E-mail" class="input-geral">
            <input type="password" id="log-senha" placeholder="Senha" class="input-geral">
            
            <button onclick="fazerLogin()" class="btn-amarelo">Entrar</button>
            <button onclick="irPara('view-cadastro')" class="mt-8 text-amber-500 text-xs font-bold uppercase tracking-widest">Criar Nova Conta</button>
        </div>
    </section>

    <section id="view-cadastro" class="tela-sistema items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <h2 class="text-2xl font-black mb-6 uppercase text-amber-500 italic">Cadastro</h2>
            <input type="text" id="cad-nome" placeholder="Nome Completo" class="input-geral">
            <input type="email" id="cad-email" placeholder="E-mail" class="input-geral">
            <input type="text" id="cad-empresa" placeholder="Sua Empresa" class="input-geral">
            <input type="password" id="cad-senha" placeholder="Senha (6 dígitos)" maxlength="6" class="input-geral">
            
            <button onclick="fazerCadastro()" class="btn-amarelo">Finalizar Cadastro</button>
            <button onclick="irPara('view-login')" class="mt-4 text-gray-500 text-xs font-bold uppercase">Voltar</button>
        </div>
    </section>

    <section id="view-app" class="tela-sistema">
        <header class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-950">
            <div class="flex items-center gap-2">
                <div class="bg-gray-900 p-1.5 rounded-md border border-gray-800">
                    <i data-lucide="user-square-2" class="w-4 h-4 text-amber-500"></i>
                </div>
                <div class="flex flex-col leading-none text-left">
                    <span class="text-[8px] font-bold text-gray-500 uppercase">Promotor</span>
                    <span class="text-sm font-black text-amber-500 uppercase">Ajudante</span>
                </div>
            </div>
            <nav class="flex gap-1 bg-gray-900 p-1 rounded-xl">
                <button onclick="navegar('h')" id="tab-h" class="aba-btn px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Início</button>
                <button onclick="navegar('l')" id="tab-l" class="aba-btn px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Lojas</button>
                <button onclick="navegar('p')" id="tab-p" class="aba-btn px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Produtos</button>
            </nav>
        </header>

        <main id="main-content" class="p-5 flex-1 overflow-y-auto pb-24"></main>
    </section>

    <script>
        // Banco de Dados e Inicialização
        let bancoLojas = JSON.parse(localStorage.getItem('ajudante_lojas')) || [];
        lucide.createIcons();

        function irPara(id) {
            const telas = document.querySelectorAll('.tela-sistema');
            telas.forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            lucide.createIcons();
        }

        // Funções de Acesso
        function fazerCadastro() {
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            if(!email || !senha) return alert("Preencha e-mail e senha!");
            
            localStorage.setItem('ajudante_user', JSON.stringify({ email, senha }));
            alert("Cadastro realizado! Agora faça o login.");
            irPara('view-login');
        }

        function fazerLogin() {
            const e = document.getElementById('log-email').value;
            const s = document.getElementById('log-senha').value;
            const user = JSON.parse(localStorage.getItem('ajudante_user'));

            if(user && user.email === e && user.senha === s) {
                irPara('view-app');
                navegar('h');
            } else {
                alert("E-mail ou senha não encontrados. Cadastre-se primeiro.");
            }
        }

        // Navegação Interna
        function navegar(aba) {
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('selecionada'));
            document.getElementById('tab-' + aba).classList.add('selecionada');

            const content = document.getElementById('main-content');
            content.innerHTML = "";

            if(aba === 'h') {
                let vencendo = 0;
                bancoLojas.forEach(loja => {
                    loja.produtos.forEach(p => {
                        const dias = Math.ceil((new Date(p.data) - new Date()) / 86400000);
                        if(dias <= 3) vencendo++;
                    });
                });
                content.innerHTML = `
                    <div class="flex gap-4 mb-8">
                        <div class="bg-gray-900 flex-1 p-6 rounded-3xl border border-gray-800 text-center">
                            <div class="text-amber-500 text-3xl font-black">${bancoLojas.length}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase">Lojas</div>
                        </div>
                        <div class="bg-gray-900 flex-1 p-6 rounded-3xl border border-gray-800 text-center">
                            <div class="text-red-500 text-3xl font-black">${vencendo}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase">Vencendo</div>
                        </div>
                    </div>
                    <h2 class="text-xs font-black text-red-500 uppercase mb-4 italic">Alertas de Validade</h2>
                `;
            }

            if(aba === 'l') {
                content.innerHTML = `<button onclick="novaUnidade()" class="btn-amarelo mb-6">Nova Loja</button>`;
                bancoLojas.forEach(l => {
                    content.innerHTML += `
                        <div class="bg-gray-900 p-4 rounded-2xl mb-2 flex justify-between items-center border border-gray-800">
                            <span class="font-bold uppercase">${l.nome}</span>
                            <i onclick="excluirUnidade('${l.nome}')" data-lucide="trash-2" class="w-5 h-5 text-red-500 cursor-pointer"></i>
                        </div>`;
                });
            }

            if(aba === 'p') {
                content.innerHTML = `
                    <h2 class="text-xl font-black uppercase mb-4 text-amber-500 italic">Novo Produto</h2>
                    <input id="p-n" placeholder="Nome do Produto" class="input-geral">
                    <input id="p-q" placeholder="Quantidade" type="number" class="input-geral">
                    <input id="p-d" type="date" class="input-geral" required>
                    <select id="p-l" class="input-geral">
                        ${bancoLojas.map(loja => `<option value="${loja.nome}">${loja.nome}</option>`).join('')}
                    </select>
                    <button onclick="salvarProduto()" class="btn-amarelo mt-4">Salvar no Estoque</button>
                `;
            }
            lucide.createIcons();
        }

        function novaUnidade() {
            const n = prompt("Nome da Loja:");
            if(n) { bancoLojas.push({nome: n, produtos: []}); salvar(); navegar('l'); }
        }

        function salvarProduto() {
            const n = document.getElementById('p-n').value;
            const q = document.getElementById('p-q').value;
            const d = document.getElementById('p-d').value;
            const l = document.getElementById('p-l').value;
            if(!n || !d || !l) return alert("Preencha todos os campos!");
            bancoLojas.find(x => x.nome === l).produtos.push({nome: n, qtd: q, data: d});
            salvar(); alert("Produto salvo!"); navegar('h');
        }

        function excluirUnidade(nome) {
            if(confirm("Excluir esta loja e todos os produtos dela?")) {
                bancoLojas = bancoLojas.filter(x => x.nome !== nome);
                salvar(); navegar('l');
            }
        }

        function salvar() { localStorage.setItem('ajudante_lojas', JSON.stringify(bancoLojas)); }
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotor Ajudante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; margin: 0; }
        .tela { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .tela.ativa { display: flex !important; }
        .input-campo { width: 100%; background-color: #111827; border: 1px solid #1f2937; padding: 15px; border-radius: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-amarelo { background-color: #f59e0b; color: #030712; font-weight: 900; padding: 15px; border-radius: 12px; text-transform: uppercase; width: 100%; border: none; cursor: pointer; }
        .nav-link.ativo { background-color: #f59e0b !important; color: #030712 !important; }
        input[type="date"]::before { content: "selecionar data "; color: #6b7280; }
        input[type="date"]:focus::before, input[type="date"]:valid::before { content: "" !important; }
    </style>
</head>
<body>

    <section id="login" class="tela ativa items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl w-fit mx-auto mb-4">
                <i data-lucide="user-square-2" class="w-12 h-12 text-amber-500"></i>
            </div>
            <h1 class="text-3xl font-black mb-8 uppercase italic">Promotor <span class="text-amber-500">Ajudante</span></h1>
            <input type="email" id="l-email" placeholder="E-mail" class="input-campo">
            <input type="password" id="l-senha" placeholder="Senha" class="input-campo">
            <button onclick="logar()" class="btn-amarelo">Entrar</button>
            <button onclick="mudar('cadastro')" class="mt-6 text-amber-500 text-xs font-bold uppercase">Criar Nova Conta</button>
        </div>
    </section>

    <section id="cadastro" class="tela items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <h2 class="text-2xl font-black mb-6 uppercase text-amber-500 italic">Cadastro</h2>
            <input type="text" id="c-nome" placeholder="Nome Completo" class="input-campo">
            <input type="email" id="c-email" placeholder="E-mail" class="input-campo">
            <input type="text" id="c-empresa" placeholder="Empresa" class="input-campo">
            <input type="password" id="c-senha" placeholder="Senha (6 dígitos)" maxlength="6" class="input-campo">
            <button onclick="cadastrar()" class="btn-amarelo">Finalizar Cadastro</button>
            <button onclick="mudar('login')" class="mt-4 text-gray-500 text-xs font-bold uppercase">Voltar</button>
        </div>
    </section>

    <section id="app" class="tela">
        <header class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-950">
            <div class="flex items-center gap-2">
                <i data-lucide="user-square-2" class="w-5 h-5 text-amber-500"></i>
                <div class="flex flex-col leading-none text-left">
                    <span class="text-[8px] font-bold text-gray-500 uppercase">Promotor</span>
                    <span class="text-sm font-black text-amber-500 uppercase">Ajudante</span>
                </div>
            </div>
            <nav class="flex gap-1 bg-gray-900 p-1 rounded-xl">
                <button onclick="aba('h')" id="n-h" class="nav-link px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Início</button>
                <button onclick="aba('l')" id="n-l" class="nav-link px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Lojas</button>
                <button onclick="aba('p')" id="n-p" class="nav-link px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Produtos</button>
            </nav>
        </header>
        <main id="corpo" class="p-5 flex-1 overflow-y-auto pb-24"></main>
    </section>

    <script>
        let lojas = JSON.parse(localStorage.getItem('bd_promotor')) || [];
        lucide.createIcons();

        function mudar(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            lucide.createIcons();
        }

        function cadastrar() {
            const e = document.getElementById('c-email').value;
            const s = document.getElementById('c-senha').value;
            if(!e || !s) return alert("Preencha os campos!");
            localStorage.setItem('user_promotor', JSON.stringify({email: e, senha: s}));
            alert("Cadastrado com sucesso!");
            mudar('login');
        }

        function logar() {
            const e = document.getElementById('l-email').value;
            const s = document.getElementById('l-senha').value;
            const u = JSON.parse(localStorage.getItem('user_promotor'));
            if(u && u.email === e && u.senha === s) { mudar('app'); aba('h'); }
            else { alert("E-mail ou senha incorretos."); }
        }

        function aba(id) {
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('ativo'));
            document.getElementById('n-' + id).classList.add('ativo');
            const m = document.getElementById('corpo');
            m.innerHTML = "";

            if(id === 'h') {
                let v = 0;
                lojas.forEach(l => l.produtos.forEach(p => {
                    const d = Math.ceil((new Date(p.data) - new Date()) / 86400000);
                    if(d <= 3) v++;
                }));
                m.innerHTML = `<div class="flex gap-4 mb-6">
                    <div class="bg-gray-900 flex-1 p-6 rounded-3xl border border-gray-800 text-center">
                        <div class="text-amber-500 text-3xl font-black">${lojas.length}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase">Lojas</div>
                    </div>
                    <div class="bg-gray-900 flex-1 p-6 rounded-3xl border border-gray-800 text-center">
                        <div class="text-red-500 text-3xl font-black">${v}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase">Vencendo</div>
                    </div>
                </div><h2 class="text-xs font-black text-red-500 uppercase mb-4 italic">Alertas Próximos</h2>`;
            }
            if(id === 'l') {
                m.innerHTML = `<button onclick="novaL()" class="btn-amarelo mb-4">Nova Loja</button>`;
                lojas.forEach(l => {
                    m.innerHTML += `<div class="bg-gray-900 p-4 rounded-2xl mb-2 flex justify-between border border-gray-800">
                        <span class="font-bold uppercase">${l.nome}</span>
                        <i onclick="delL('${l.nome}')" data-lucide="trash-2" class="text-red-500 w-5 h-5"></i>
                    </div>`;
                });
            }
            if(id === 'p') {
                m.innerHTML = `<h2 class="text-xl font-black mb-4 text-amber-500">Novo Produto</h2>
                    <input id="pn" placeholder="Nome" class="input-campo">
                    <input id="pq" placeholder="Qtd" type="number" class="input-campo">
                    <input id="pd" type="date" class="input-campo" required>
                    <select id="pl" class="input-campo">${lojas.map(l => `<option>${l.nome}</option>`).join('')}</select>
                    <button onclick="addP()" class="btn-amarelo mt-2">Salvar</button>`;
            }
            lucide.createIcons();
        }

        function novaL() { const n = prompt("Nome da Loja:"); if(n) { lojas.push({nome: n, produtos: []}); salvar(); aba('l'); } }
        function delL(n) { if(confirm("Excluir?")) { lojas = lojas.filter(x => x.nome !== n); salvar(); aba('l'); } }
        function addP() {
            const p = { nome: document.getElementById('pn').value, qtd: document.getElementById('pq').value, data: document.getElementById('pd').value };
            const l = document.getElementById('pl').value;
            lojas.find(x => x.nome === l).produtos.push(p);
            salvar(); alert("Salvo!"); aba('h');
        }
        function salvar() { localStorage.setItem('bd_promotor', JSON.stringify(lojas)); }
    </script>
</body>
</html>
