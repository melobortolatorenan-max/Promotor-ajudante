<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotor Ajudante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; margin: 0; overflow: hidden; }
        .secao { display: none; height: 100vh; flex-direction: column; }
        .secao.ativa { display: flex !important; }
        .card-alerta { background-color: #111827; border: 1px solid #1f2937; border-left: 4px solid #ef4444; border-radius: 1.2rem; margin-bottom: 0.8rem; padding: 1rem; cursor: pointer; }
        .card-produto { background-color: #111827; border: 1px solid #1f2937; border-radius: 1rem; margin-bottom: 0.8rem; padding: 1rem; }
        .nav-aba.ativa { background-color: #f59e0b !important; color: #030712 !important; }
        .input-custom { width: 100%; background-color: #0f172a; border: 1px solid #1e293b; padding: 0.8rem; border-radius: 0.8rem; color: white; margin-bottom: 0.6rem; outline: none; }
        .btn-amarelo { background-color: #f59e0b; color: #030712; font-weight: 900; padding: 1rem; border-radius: 1rem; text-transform: uppercase; width: 100%; border: none; }
        #modal-container { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; padding: 2rem; }
        #modal-content { background: #111827; border: 1px solid #1f2937; border-radius: 1.5rem; width: 100%; max-width: 320px; padding: 1.5rem; }
    </style>
</head>
<body>

    <div id="modal-container">
        <div id="modal-content">
            <h2 class="text-amber-500 font-black text-sm uppercase italic mb-1 tracking-tighter">PROMOTOR AJUDANTE AVISA:</h2>
            <p id="modal-subtext" class="text-white text-[11px] mb-4 font-medium opacity-90"></p>
            <div id="modal-input-area"><input id="modal-input" class="input-custom border-amber-500/30" type="text"></div>
            <div class="flex gap-2 mt-2">
                <button onclick="fecharModal()" class="flex-1 py-3 text-[10px] font-black uppercase text-gray-500">Cancelar</button>
                <button id="modal-confirm" class="flex-1 bg-amber-500 text-gray-950 py-3 rounded-xl text-[10px] font-black uppercase">Confirmar</button>
            </div>
        </div>
    </div>

    <section id="tela-app" class="secao ativa">
        <header class="p-4 border-b border-gray-800 bg-gray-950">
            <div class="flex items-center gap-3 mb-4">
                <img src="https://raw.githubusercontent.com/melobortolatorenan-max/Promotor-ajudante/main/logo.png" class="w-10 h-10 rounded-lg">
                <div>
                    <h1 class="text-xs font-bold text-gray-500 uppercase tracking-widest leading-none">Promotor</h1>
                    <span class="text-lg font-black text-amber-500 uppercase italic leading-none">Ajudante</span>
                </div>
            </div>
            <nav class="flex gap-1 bg-gray-900 p-1 rounded-xl">
                <button onclick="aba('h')" id="n-h" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Início</button>
                <button onclick="aba('l')" id="n-l" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Lojas</button>
                <button onclick="aba('p')" id="n-p" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Produtos</button>
                <button onclick="aba('r')" id="n-r" class="nav-aba flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Relat.</button>
            </nav>
        </header>
        <main id="corpo" class="p-4 flex-1 overflow-y-auto pb-24"></main>
    </section>

    <script>
        let lojas = JSON.parse(localStorage.getItem('db_promotor_v3')) || [];
        let editando = { lojaIdx: -1, prodIdx: -1 };

        function salvar() { localStorage.setItem('db_promotor_v3', JSON.stringify(lojas)); }
        function fecharModal() { document.getElementById('modal-container').style.display = 'none'; }

        function exibirModal(mensagem, valorInicial, callback, apenasConfirmar = false) {
            document.getElementById('modal-subtext').innerText = mensagem;
            const input = document.getElementById('modal-input');
            const inputArea = document.getElementById('modal-input-area');
            
            inputArea.style.display = apenasConfirmar ? 'none' : 'block';
            input.value = valorInicial || "";
            
            document.getElementById('modal-container').style.display = 'flex';
            
            document.getElementById('modal-confirm').onclick = () => {
                if (apenasConfirmar) {
                    callback(true);
                    fecharModal();
                } else {
                    const resultado = input.value.trim();
                    if (resultado) { callback(resultado); fecharModal(); }
                }
            };
        }

        function aba(id, params = {}) {
            document.querySelectorAll('.nav-aba').forEach(b => b.classList.remove('ativa'));
            const navBtn = document.getElementById('n-' + id);
            if(navBtn) navBtn.classList.add('ativa');
            const m = document.getElementById('corpo'); m.innerHTML = "";

            if(id === 'h') {
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const limite = new Date(hoje); limite.setDate(hoje.getDate() + 3);
                let alertas = [];
                lojas.forEach((loja, lIdx) => {
                    if(loja.produtos) {
                        loja.produtos.forEach((p, pIdx) => {
                            const dataP = new Date(p.data + "T12:00:00");
                            if(dataP <= limite) alertas.push({ ...p, lojaNome: loja.nome, lIdx, pIdx });
                        });
                    }
                });

                m.innerHTML = `
                    <div class="grid grid-cols-2 gap-3 mb-6 text-center">
                        <div class="bg-gray-900/50 p-5 rounded-2xl border border-gray-800">
                            <div class="text-3xl font-black text-amber-500 italic">${lojas.length}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Lojas</div>
                        </div>
                        <div class="bg-gray-900/50 p-5 rounded-2xl border border-gray-800">
                            <div class="text-3xl font-black text-red-500 italic">${alertas.length}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Alertas</div>
                        </div>
                    </div>
                    <h3 class="text-[11px] font-black uppercase text-red-500 mb-4 italic flex items-center gap-2 px-1">
                        <i data-lucide="alert-triangle" class="w-4 h-4"></i> VENCIMENTOS PRÓXIMOS
                    </h3>
                    ${alertas.map(item => `
                        <div class="card-alerta" onclick="verLoja(${item.lIdx})">
                            <span class="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">${item.lojaNome}</span>
                            <div class="text-amber-500 font-black text-sm uppercase italic mb-2 border-b border-white/5 pb-1">${item.nome}</div>
                            <div class="flex justify-between items-center mt-1">
                                <span class="text-white text-xs font-bold">${item.data.split('-').reverse().join('/')}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-red-500 font-black text-xs">${item.qtd} un</span>
                                    <i onclick="event.stopPropagation(); confirmarRemoverProd(${item.lIdx}, ${item.pIdx}, true)" data-lucide="trash-2" class="w-4 h-4 text-red-800 active:text-red-500"></i>
                                </div>
                            </div>
                        </div>`).join('') || '<div class="text-center p-10 opacity-20 font-black text-xs uppercase italic">Sem alertas</div>'}`;
            }

            if(id === 'l') {
                m.innerHTML = `<button onclick="addLoja()" class="btn-amarelo mb-6 w-full">+ ADICIONAR LOJA</button>`;
                lojas.forEach((l, idx) => {
                    m.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-2 flex justify-between items-center shadow-lg" onclick="verLoja(${idx})">
                            <div class="flex-1 truncate">
                                <span class="font-black uppercase italic text-sm truncate block tracking-tighter">${l.nome}</span>
                                <span class="text-[10px] text-amber-500 font-black uppercase italic">${l.produtos ? l.produtos.length : 0} Produtos</span>
                            </div>
                            <div class="flex gap-4 ml-2">
                                <i onclick="event.stopPropagation(); aba('p',{loja:'${l.nome}'})" data-lucide="plus-circle" class="w-5 h-5 text-green-500"></i>
                                <i onclick="event.stopPropagation(); delLoja(${idx})" data-lucide="trash-2" class="w-5 h-5 text-red-600"></i>
                            </div>
                        </div>`;
                });
            }

            if(id === 'p') {
                const p = params.prod || { nome: '', qtd: '', data: '' };
                const voltarAcao = params.loja ? `verLoja(lojas.findIndex(x => x.nome === '${params.loja}'))` : `aba('l')`;
                m.innerHTML = `
                <div class="flex items-center mb-6 relative">
                    <button onclick="${voltarAcao}" class="absolute left-0"><i data-lucide="chevron-left" class="w-6 h-6 text-amber-500"></i></button>
                    <h2 class="w-full text-center font-black uppercase text-amber-500 italic text-sm">${params.prod ? 'EDITAR ITEM' : 'CADASTRAR PRODUTO'}</h2>
                </div>
                <input id="pn" placeholder="Nome do Produto" class="input-custom" value="${p.nome}">
                <input id="pq" placeholder="Quantidade" type="number" class="input-custom" value="${p.qtd}">
                <input id="pd" type="date" class="input-custom" value="${p.data}">
                <select id="pl" class="input-custom">
                    <option value="">Selecione a Loja</option>
                    ${lojas.map(l => `<option value="${l.nome}" ${l.nome===(params.loja||'')?'selected':''}>${l.nome}</option>`).join('')}
                </select>
                <button onclick="salvarP()" class="btn-amarelo mt-4 w-full">SALVAR</button>`;
                editando = params.ref || { lojaIdx: -1, prodIdx: -1 };
            }

            if(id === 'r') {
                m.innerHTML = `<h2 class="text-center font-black uppercase text-amber-500 italic mb-6 tracking-tighter">RELATÓRIO GERAL</h2>`;
                lojas.forEach(loja => {
                    if(loja.produtos && loja.produtos.length > 0) {
                        let htmlLoja = `<div class="mb-4 bg-gray-900 p-4 rounded-xl border border-gray-800">
                            <h3 class="text-amber-500 font-black text-[10px] mb-2 border-b border-gray-800 pb-1 uppercase italic">${loja.nome}</h3>`;
                        loja.produtos.forEach(p => {
                            htmlLoja += `<div class="flex justify-between text-[11px] font-bold py-1 border-b border-white/5">
                                <span class="uppercase">${p.nome}</span>
                                <span class="text-gray-400">${p.data.split('-').reverse().join('/')} | ${p.qtd} UN</span>
                            </div>`;
                        });
                        m.innerHTML += htmlLoja + `</div>`;
                    }
                });
            }
            lucide.createIcons();
        }

        function verLoja(idx) {
            const l = lojas[idx];
            const m = document.getElementById('corpo');
            let agrupados = {};
            l.produtos.forEach((p, pIdx) => {
                if (!agrupados[p.nome]) agrupados[p.nome] = [];
                agrupados[p.nome].push({ ...p, originalIdx: pIdx });
            });

            m.innerHTML = `
                <div class="flex items-center mb-4">
                    <button onclick="aba('l')"><i data-lucide="chevron-left" class="w-6 h-6 text-amber-500"></i></button>
                    <h2 class="flex-1 text-center font-black uppercase text-amber-500 italic text-sm truncate mx-2 tracking-tighter">${l.nome}</h2>
                    <i onclick="renomearLoja(${idx})" data-lucide="edit-3" class="w-5 h-5 text-gray-500"></i>
                </div>
                <button onclick="aba('p',{loja:'${l.nome}'})" class="btn-amarelo mb-6 w-full text-xs italic">+ NOVO PRODUTO NESTA LOJA</button>
                ${Object.keys(agrupados).map(nomeProd => `
                    <div class="card-produto">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-amber-500 font-black text-xs uppercase italic tracking-tighter">${nomeProd}</h3>
                            <div class="flex gap-2"><i data-lucide="chevron-up" class="w-4 h-4 text-gray-700"></i><i data-lucide="chevron-down" class="w-4 h-4 text-gray-700"></i></div>
                        </div>
                        ${agrupados[nomeProd].map(item => {
                            const pJson = JSON.stringify(item).replace(/"/g, '&quot;');
                            return `
                            <div class="flex items-center justify-between py-2 border-t border-gray-800/50">
                                <span class="text-[11px] font-bold text-gray-300">${item.data.split('-').reverse().join('/')} | <span class="text-white">${item.qtd} un</span></span>
                                <div class="flex gap-3">
                                    <i onclick="aba('p', {loja:'${l.nome}', prod:${pJson}, ref:{lojaIdx:${idx}, prodIdx:${item.originalIdx}}})" data-lucide="edit-2" class="w-4 h-4 text-blue-400 cursor-pointer"></i>
                                    <i onclick="confirmarRemoverProd(${idx}, ${item.originalIdx})" data-lucide="x-circle" class="w-4 h-4 text-red-500 cursor-pointer"></i>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                `).join('') || '<div class="opacity-20 text-center py-10 text-xs font-black italic">VAZIO</div>'}`;
            lucide.createIcons();
        }

        function salvarP() {
            const n = document.getElementById('pn').value.toUpperCase();
            const q = document.getElementById('pq').value;
            const d = document.getElementById('pd').value;
            const lNome = document.getElementById('pl').value;
            if(!n || !q || !d || !lNome) return alert("Preencha todos os campos!");
            const lIdx = lojas.findIndex(x => x.nome === lNome);
            if(editando.prodIdx > -1) { lojas[editando.lojaIdx].produtos.splice(editando.prodIdx, 1); }
            lojas[lIdx].produtos.push({ nome: n, qtd: q, data: d });
            salvar();
            verLoja(lIdx);
        }

        function confirmarRemoverProd(li, pi, voltaInicio = false) {
            exibirModal("DESEJA REALMENTE REMOVER ESTE PRODUTO?", "", () => {
                lojas[li].produtos.splice(pi, 1);
                salvar();
                if(voltaInicio) aba('h'); else verLoja(li);
            }, true);
        }

        function addLoja() {
            exibirModal("NOME DA NOVA LOJA:", "", (nome) => {
                lojas.push({ nome: nome.toUpperCase(), produtos: [] });
                salvar(); aba('l');
            });
        }

        function delLoja(idx) {
            exibirModal("EXCLUIR ESTA LOJA PERMANENTEMENTE?", "", () => {
                lojas.splice(idx, 1);
                salvar();
                aba('l');
            }, true);
        }

        function renomearLoja(idx) {
            exibirModal("NOVO NOME DA LOJA:", lojas[idx].nome, (nome) => {
                lojas[idx].nome = nome.toUpperCase(); salvar(); verLoja(idx);
            });
        }

        aba('h');
    </script>
</body>

            const l = lojas[idx];
            const m = document.getElementById('corpo');
            let agrupados = {};
            l.produtos.forEach((p, pIdx) => {
                if (!agrupados[p.nome]) agrupados[p.nome] = [];
                agrupados[p.nome].push({ ...p, originalIdx: pIdx });
            });

            m.innerHTML = `
                <div class="flex items-center mb-4">
                    <button onclick="aba('l')"><i data-lucide="chevron-left" class="w-6 h-6 text-amber-500"></i></button>
                    <h2 class="flex-1 text-center font-black uppercase text-amber-500 italic text-sm truncate mx-2 tracking-tighter">${l.nome}</h2>
                    <i onclick="renomearLoja(${idx})" data-lucide="edit-3" class="w-5 h-5 text-gray-500"></i>
                </div>
                <button onclick="aba('p',{loja:'${l.nome}'})" class="btn-amarelo mb-6 w-full text-xs italic">+ NOVO PRODUTO NESTA LOJA</button>
                ${Object.keys(agrupados).map(nomeProd => `
                    <div class="card-produto">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-amber-500 font-black text-xs uppercase italic tracking-tighter">${nomeProd}</h3>
                            <div class="flex gap-2"><i data-lucide="chevron-up" class="w-4 h-4 text-gray-700"></i><i data-lucide="chevron-down" class="w-4 h-4 text-gray-700"></i></div>
                        </div>
                        ${agrupados[nomeProd].map(item => {
                            const pJson = JSON.stringify(item).replace(/"/g, '&quot;');
                            return `
                            <div class="flex items-center justify-between py-2 border-t border-gray-800/50">
                                <span class="text-[11px] font-bold text-gray-300">${item.data.split('-').reverse().join('/')} | <span class="text-white">${item.qtd} un</span></span>
                                <div class="flex gap-3">
                                    <i onclick="aba('p', {loja:'${l.nome}', prod:${pJson}, ref:{lojaIdx:${idx}, prodIdx:${item.originalIdx}}})" data-lucide="edit-2" class="w-4 h-4 text-blue-400 cursor-pointer"></i>
                                    <i onclick="confirmarRemoverProd(${idx}, ${item.originalIdx})" data-lucide="x-circle" class="w-4 h-4 text-red-500 cursor-pointer"></i>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                `).join('') || '<div class="opacity-20 text-center py-10 text-xs font-black italic">VAZIO</div>'}`;
            lucide.createIcons();
        }

        function salvarP() {
            const n = document.getElementById('pn').value.toUpperCase();
            const q = document.getElementById('pq').value;
            const d = document.getElementById('pd').value;
            const lNome = document.getElementById('pl').value;
            if(!n || !q || !d || !lNome) return alert("Preencha todos os campos!");
            const lIdx = lojas.findIndex(x => x.nome === lNome);
            if(editando.prodIdx > -1) { lojas[editando.lojaIdx].produtos.splice(editando.prodIdx, 1); }
            lojas[lIdx].produtos.push({ nome: n, qtd: q, data: d });
            salvar();
            verLoja(lIdx);
        }

            exibirModal("DESEJA REALMENTE REMOVER ESTE PRODUTO?", "", () => {

                salvar();
                if(voltaInicio) aba('h'); else verLoja(li);
            }, true); // O 'true' indica que é apenas um modal de confirmação (sem input)
        }
