<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promotor Ajudante</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030712">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; margin: 0; overflow: hidden; color: white; }

        .secao-master {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none !important; z-index: 10; background-color: #030712;
        }
        .secao-master.active { display: flex !important; flex-direction: column; }
        
        .conteudo-app { display: none !important; }
        .conteudo-app.active { display: block !important; }

        .nav-item.active-nav { background-color: #f59e0b !important; color: #030712 !important; }
        
        input { transition: all 0.2s; }
        input:focus { border-color: #f59e0b !important; outline: none; }
        
        main { overflow-y: auto; }
    </style>
</head>
<body>

    <section id="tela-login" class="secao-master active items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="bg-amber-500 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-amber-500/20">
                <i data-lucide="shield-check" class="w-12 h-12 text-gray-950"></i>
            </div>
            <h1 class="text-4xl font-black mb-2 uppercase tracking-tighter">Promotor <span class="text-amber-500">Ajudante</span></h1>
            <p class="text-gray-400 mb-10 text-sm">Gerencie suas validades com facilidade</p>
            
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                <button onclick="tentarLogin()" class="w-full bg-amber-500 text-gray-950 font-black py-4 rounded-xl uppercase tracking-widest">Entrar</button>
                <button onclick="irParaCadastro()" class="w-full border border-gray-800 text-gray-400 font-bold py-4 rounded-xl text-sm">Criar nova conta</button>
            </div>
        </div>
    </section>

    <section id="tela-cadastro" class="secao-master p-6">
        <main class="w-full max-w-sm mx-auto py-8">
            <h2 class="text-3xl font-black mb-2 uppercase">Cadastro</h2>
            <p class="text-gray-500 text-sm mb-8">Preencha todos os campos obrigatórios</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nome Completo</label>
                    <input type="text" id="cad-nome" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">E-mail para cadastro</label>
                    <input type="email" id="cad-email" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Cidade</label>
                        <input type="text" id="cad-cidade" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Empresa</label>
                        <input type="text" id="cad-empresa" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Senha (6 dígitos)</label>
                    <input type="password" id="cad-senha" maxlength="6" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Confirmar Senha</label>
                    <input type="password" id="cad-confirmar" maxlength="6" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl">
                </div>
                
                <button onclick="validarCadastro()" class="w-full bg-amber-500 text-gray-950 font-black py-4 rounded-xl uppercase flex items-center justify-center gap-2 mt-4">
                    <i data-lucide="user-plus" class="w-5 h-5"></i> Finalizar Cadastro
                </button>
                <button onclick="irParaLogin()" class="w-full text-gray-500 font-bold py-2 text-xs uppercase">Voltar ao login</button>
            </div>
        </main>
    </section>

    <section id="app-principal" class="secao-master">
        <header class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-950">
            <div class="flex items-center gap-2">
                <div class="bg-amber-500 p-1 rounded-md">
                    <i data-lucide="clock" class="w-4 h-4 text-gray-950"></i>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-[8px] font-bold text-amber-500 uppercase">App</span>
                    <span id="header-nome" class="text-sm font-black text-white uppercase">Ajudante</span>
                </div>
            </div>
            <div class="flex gap-1 bg-gray-900 p-1 rounded-xl">
                <button onclick="navegar('home')" id="nav-h" class="nav-item active-nav px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Início</button>
                <button onclick="navegar('lojas')" id="nav-l" class="nav-item px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Lojas</button>
                <button onclick="deslogar()" class="px-2 py-2 text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </header>

        <main class="flex-1 p-6">
            <div id="cont-home" class="conteudo-app active">
                <div id="home-vazia" class="text-center py-10">
                    <div class="bg-gray-900/50 p-10 rounded-[40px] border border-gray-800 border-dashed max-w-sm mx-auto">
                        <i data-lucide="store" class="w-12 h-12 text-amber-500/30 mx-auto mb-4"></i>
                        <h2 class="text-2xl font-black mb-2 uppercase">Olá, <span id="user-display-name">...</span></h2>
                        <p class="text-gray-500 text-sm mb-8">Você ainda não possui lojas cadastradas.</p>
                        <button onclick="navegar('lojas')" class="w-full bg-amber-500 text-gray-950 font-black py-4 rounded-2xl uppercase">Criar Primeira Loja</button>
                    </div>
                </div>
                <div id="home-dados" class="hidden">
                    </div>
            </div>

            <div id="cont-lojas" class="conteudo-app">
                <h2 class="text-2xl font-black mb-6 uppercase text-amber-500">Cadastrar Unidade</h2>
                <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 space-y-4">
                    <input type="text" id="input-nome-loja" placeholder="Nome da Loja" class="w-full bg-gray-950 border border-gray-800 p-4 rounded-xl">
                    <button onclick="salvarLoja()" class="w-full bg-amber-500 text-gray-950 font-black py-4 rounded-xl uppercase">Salvar Loja</button>
                </div>
            </div>
        </main>
    </section>

    <script>
        lucide.createIcons();

        // FUNÇÕES DE NAVEGAÇÃO ENTRE TELAS MESTRAS
        function trocarTelaMestra(id) {
            document.querySelectorAll('.secao-master').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        }

        function irParaCadastro() { trocarTelaMestra('tela-cadastro'); }
        function irParaLogin() { trocarTelaMestra('tela-login'); }

        // CADASTRO E VALIDAÇÃO
        function validarCadastro() {
            const dados = {
                nome: document.getElementById('cad-nome').value,
                email: document.getElementById('cad-email').value,
                cidade: document.getElementById('cad-cidade').value,
                empresa: document.getElementById('cad-empresa').value,
                senha: document.getElementById('cad-senha').value,
                conf: document.getElementById('cad-confirmar').value
            };

            if (!dados.nome || !dados.email || !dados.cidade || !dados.empresa || !dados.senha) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            if (dados.senha.length < 6) {
                alert("A senha deve ter 6 dígitos.");
                return;
            }

            if (dados.senha !== dados.conf) {
                alert("As senhas não coincidem.");
                return;
            }

            // SALVAMENTO AUTOMÁTICO NA "CONTA" (LocalStorage)
            localStorage.setItem('userAccount', JSON.stringify(dados));
            localStorage.setItem('lojas', JSON.stringify([])); // Inicia lista de lojas vazia
            
            alert("Cadastro realizado com sucesso! 🎉");
            logarNoApp(dados);
        }

        // LOGIN
        function tentarLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            const contaSalva = JSON.parse(localStorage.getItem('userAccount'));

            if (contaSalva && contaSalva.email === email && contaSalva.senha === senha) {
                logarNoApp(contaSalva);
            } else {
                alert("E-mail ou senha incorretos.");
            }
        }

        function logarNoApp(user) {
            document.getElementById('user-display-name').innerText = user.nome.split(' ')[0];
            document.getElementById('header-nome').innerText = user.empresa;
            trocarTelaMestra('app-principal');
            carregarLojas();
        }

        function deslogar() {
            if(confirm("Deseja sair do app?")) {
                trocarTelaMestra('tela-login');
            }
        }

        // GERENCIAMENTO DE LOJAS (SALVAMENTO AUTOMÁTICO)
        function salvarLoja() {
            const nomeLoja = document.getElementById('input-nome-loja').value;
            if(!nomeLoja) return;

            let lojas = JSON.parse(localStorage.getItem('lojas')) || [];
            lojas.push({ nome: nomeLoja, produtos: [] });
            localStorage.setItem('lojas', JSON.stringify(lojas));

            document.getElementById('input-nome-loja').value = "";
            carregarLojas();
            navegar('home');
        }

        function carregarLojas() {
            const lojas = JSON.parse(localStorage.getItem('lojas')) || [];
            const containerVazio = document.getElementById('home-vazia');
            const containerDados = document.getElementById('home-dados');

            if (lojas.length > 0) {
                containerVazio.classList.add('hidden');
                containerDados.classList.remove('hidden');
                containerDados.innerHTML = `<h2 class="text-xl font-bold mb-4">Minhas Lojas</h2>`;
                lojas.forEach(loja => {
                    containerDados.innerHTML += `
                        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 mb-3 flex justify-between items-center">
                            <span class="font-bold">${loja.nome}</span>
                            <i data-lucide="chevron-right" class="text-amber-500 w-5 h-5"></i>
                        </div>
                    `;
                });
                lucide.createIcons();
            } else {
                containerVazio.classList.remove('hidden');
                containerDados.classList.add('hidden');
            }
        }

        function navegar(alvo) {
            document.getElementById('cont-home').classList.remove('active');
            document.getElementById('cont-lojas').classList.remove('active');
            document.getElementById('nav-h').classList.remove('active-nav');
            document.getElementById('nav-l').classList.remove('active-nav');

            if(alvo === 'home') {
                document.getElementById('cont-home').classList.add('active');
                document.getElementById('nav-h').classList.add('active-nav');
                carregarLojas();
            } else {
                document.getElementById('cont-lojas').classList.add('active');
                document.getElementById('nav-l').classList.add('active-nav');
            }
            lucide.createIcons();
        }

        // AUTO-LOGIN AO ABRIR O APP (OPCIONAL)
        window.onload = () => {
            const logado = localStorage.getItem('userAccount');
            // Se quiser que ele peça login toda vez, deixe como está. 
            // Se quiser auto-login, descomente a linha abaixo:
            // if(logado) logarNoApp(JSON.parse(logado));
        };
    </script>
</body>
</html>
